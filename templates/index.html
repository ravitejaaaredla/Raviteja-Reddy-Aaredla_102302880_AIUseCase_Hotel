<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Hotel - Booking Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Background image container -->
    <div class="background-container"></div>


      <h1 style="font-size: 100px; font-Algerian: bold; color:Orange;">Sunshine Hotel</h1>
<h2 style="font-size: 36px; color: #333;"><strong>Welcome to Sunshine Hotel</strong></h2>
<h2 style="font-size: 36px; color: #555;"><strong>Please visit our new and faster booking</strong></h2>
<h2 style="font-size: 36px; color: #008080;"><strong>Enjoy your trip</strong></h2>


    <!-- Main content container -->
    <div class="main-container">
        <!-- Student details section -->
        <div class="student-details">
            <h2>Student Details</h2>
            <p><strong>Name:</strong> Raviteja Reddy</p>
            <p><strong>Student ID:</strong> 102302880</p>
            <p><strong>Subject:</strong> AI Use Case (DLMAIPAIUC01)</p>
        </div>

        <!-- iPhone frame with chatbot -->
        <div class="iphone-frame">
            <div class="iphone-notch"></div>
            <div class="iphone-screen">
                <div class="chat-container">
                    <div class="chat-header">
                        <h2>👩🏻‍💼 Sunshine bot</h2>
                    </div>
                    <div class="chat-messages">
                        {% for message in messages %}
                            <div class="message {% if 'You:' in message %}user-message{% else %}bot-message{% endif %}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                    <div class="chat-input">
                        <form method="POST" action="/">
                            <input type="text" name="user_input" placeholder="Type your message here..." autofocus required>
                            <button type="submit">Send</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
